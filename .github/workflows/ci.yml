name: CI service-courier

on:
  push:
    branches: [ main,  dev-10-12 ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.10.1

      - name: Start linting
        run: golangci-lint run
  
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5
      
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      
      - name: Run unit-tests
        run: go test -v -count=1 -race ./...

  integration-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v5
      
      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      
      - name: Run integration-tests
        run: go test -v -tags=integration -count=1 -race ./...
